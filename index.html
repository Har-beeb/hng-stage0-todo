<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HNG Stage 0 - Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <article data-testid="test-todo-card" class="todo-card">
        <h2 data-testid="test-todo-title" id="todo-title">
          Submit Stage 0 Task
        </h2>
        <p data-testid="test-todo-description">
          Complete the HNG internship frontend task using Vanilla JS.
        </p>

        <div class="meta-info">
          <span data-testid="test-todo-priority" class="priority-high">
            High
          </span>
          <span data-testid="test-todo-status" id="todo-status"> Pending </span>
        </div>

        <div class="date-info">
          <time
            data-testid="test-todo-due-date"
            id="due-date"
            datetime="2026-04-16T23:59:59+01:00"
            class="icon-text-group"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Due Apr 16, 2026
          </time>
          <p data-testid="test-todo-time-remaining" id="time-remaining"></p>
        </div>

        <ul data-testid="test-todo-tags" class="tags-list">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
        </ul>

        <div class="actions">
          <label class="checkbox-container">
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              id="complete-checkbox"
            />
            Mark as complete
          </label>

          <div class="buttons">
            <button
              data-testid="test-todo-edit-button"
              id="edit-button"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 20h9"></path>
                <path
                  d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
                ></path>
              </svg>
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              id="delete-button"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="3 6 5 6 21 6"></polyline>
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                ></path>
              </svg>
              Delete
            </button>
          </div>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
