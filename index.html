<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HNG Stage 0 - Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <article data-testid="test-todo-card" class="todo-card">
        <h2 data-testid="test-todo-title" id="todo-title">
          Submit Stage 0 Task
        </h2>
        <p data-testid="test-todo-description">
          Complete the HNG internship frontend task using Vanilla JS.
        </p>

        <div class="meta-info">
          <span data-testid="test-todo-priority" class="priority-high"
            >High</span
          >
          <span data-testid="test-todo-status" id="todo-status">Pending</span>
        </div>

        <div class="date-info">
          <time
            data-testid="test-todo-due-date"
            id="due-date"
            datetime="2026-04-13T18:00:00"
          >
            Due Apr 13, 2026
          </time>
          <p data-testid="test-todo-time-remaining" id="time-remaining"></p>
        </div>

        <ul data-testid="test-todo-tags" class="tags-list">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
        </ul>

        <div class="actions">
          <label class="checkbox-container">
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              id="complete-checkbox"
            />
            Mark as complete
          </label>

          <div class="buttons">
            <button data-testid="test-todo-edit-button" aria-label="Edit Task">
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              aria-label="Delete Task"
            >
              Delete
            </button>
          </div>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
